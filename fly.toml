# Fly.io config for CommandAI. Rename `app` to your own unique app name
# (or let `fly launch` set it). `fra` (Frankfurt) is the closest Fly region
# to Israel; change with `fly regions set <code>` if you prefer.
app = "commandai"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: keep exactly one machine running so there is never a cold
  # start (the whole reason we left Community Cloud). This is the cheap,
  # steady-state single-machine setup.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 60
    hard_limit = 80

  # Streamlit's health endpoint — Fly marks the machine healthy once it answers.
  [[http_service.checks]]
    interval = "15s"
    timeout = "4s"
    grace_period = "40s"
    method = "GET"
    path = "/_stcore/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
