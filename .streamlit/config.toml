# Serve the source-order PDFs at /app/static/<file>.pdf so the "open PDF"
# action under each answer can link straight to the browser's PDF viewer.
[server]
enableStaticServing = true

# NO toolbarMode override. `toolbarMode = "minimal"` sounded like a clean
# way to drop the platform icons from the first loading frame, but on 1.58
# it UNMOUNTS the whole sidebar + stExpandSidebarButton from the DOM (A/B
# proven locally 2026-07-13: identical build, flag flipped via CLI — with
# "minimal" neither exists, with "auto" both return). That kills the drawer
# (letters, calculators, switch-role) on every device. Platform-icon flash
# is instead handled by the app CSS + the boot splash covering the frame.

# Pin the dark olive theme regardless of the device's light/dark mode —
# without this, iPhones in light mode render Streamlit's light theme
# (dark text) under our dark backgrounds and the text is unreadable.
#
# backgroundColor is the SPLASH olive on purpose: Streamlit paints the whole
# loading screen with it from the moment the websocket delivers the config
# until the script's first render — so the wait matches the splash curtain
# instead of flashing a generic dark placeholder (verified on 1.58: the
# frontend caches only preset NAMES in localStorage, so this is the only
# themable loading phase). The app itself never shows this color — app.py
# CSS forces the dark backdrop on every visible surface (and _render_admin
# injects its own dark override).
[theme]
base = "dark"
primaryColor = "#99A26B"
backgroundColor = "#99A26B"
secondaryBackgroundColor = "#21261A"
textColor = "#ECEDE6"
# dataframe headers default to a mix of backgroundColor (now olive) — keep
# the admin tables' header row on the dark surface color instead
dataframeHeaderBackgroundColor = "#21261A"
