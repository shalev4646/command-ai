# תבנית ל-secrets של CommandAI.
#
# מקומית: העתק ל-.streamlit/secrets.toml (הקובץ ב-.gitignore — לא יעלה לגיט).
# בענן:   Streamlit Cloud → האפליקציה → Settings → Secrets → הדבק את התוכן.
#
# בלי הקובץ הזה האפליקציה עובדת רגיל — רק בלי דשבורד מנהל ובלי שמירת
# הלוג ל-Google Sheets (הנתונים יישמרו בזיכרון עד האתחול הבא).

# סיסמת הדשבורד — פתח את האפליקציה עם ?admin=1 בסוף הכתובת
admin_password = "בחר-סיסמה-חזקה"

[metrics]
# כתובת גיליון Google Sheets שאליו נשמרים הלוג והמשובים.
# שתף את הגיליון עם כתובת המייל של חשבון השירות (client_email למטה) כעורך.
sheet_url = "https://docs.google.com/spreadsheets/d/XXXXXXXXXXXX"

[gcp_service_account]
# הדבק כאן את השדות מקובץ ה-JSON של חשבון השירות (Google Cloud Console →
# IAM & Admin → Service Accounts → Keys → Add key → JSON):
type = "service_account"
project_id = "your-project-id"
private_key_id = "..."
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = "commandai-metrics@your-project-id.iam.gserviceaccount.com"
client_id = "..."
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "..."
